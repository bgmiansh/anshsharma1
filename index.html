<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💖</title>

    <!-- CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating hearts background -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- Main card -->
    <div class="card">
        <div class="heart-decoration">💖</div>

        <!-- Initial content -->
        <div id="initialContent">
            <h1>Will you be my Valentine? 💖</h1>
            <p class="playful-message" id="playfulMessage"></p>

            <div class="buttons">
                <button class="yes-btn" id="yesBtn">Yes 💕</button>
                <button class="no-btn" id="noBtn">No 😅</button>
            </div>
        </div>

        <!-- Success message -->
        <div class="success-message" id="successMessage">
            <h2>Yay! 🎉💖</h2>
            <p>You just made my world brighter. I'm so lucky to have you 💖</p>
            <p>
                Every moment with you feels like a dream come true.
                You're my sunshine on cloudy days and my forever Valentine. 💕
            </p>
            <div style="font-size: 60px; margin-top: 20px;">
                💑❤️💐
            </div>
        </div>
    </div>

    <!-- JS file -->
    <script src="script.js"></script>
</body>
</html>
